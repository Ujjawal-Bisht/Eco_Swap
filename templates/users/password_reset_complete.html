{% extends 'base.html' %}

{% block title %}Password Reset Complete - EcoSwap{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 80px auto; padding: 40px; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; border: 1px solid #e8f5e9;">

    <div style="font-size: 60px; margin-bottom: 20px;">✅</div>

    <h2 style="color: #2d5a27; margin-bottom: 15px; font-size: 2rem;">Password Reset!</h2>

    <p style="color: #555; font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px;">
        Your password has been changed successfully. You can now log in with your new password.
    </p>

    <a href="{% url 'login' %}" style="display: inline-block; background: #2d5a27; color: white; padding: 14px 30px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 1rem;">
        Log In Now
    </a>
</div>
{% endblock %}
